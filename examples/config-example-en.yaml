# Example: English-primary user who wants concise, jargon-free responses
constraint_gate:
  enabled: true
  log_violations: true
  log_path: ~/.hermes/constraint-gate.log
  gates:
    # ── Language: ensure English is dominant ──
    - name: english_minimum
      description: "Latin script must be >= 80% of meaningful characters"
      enabled: true
      type: language_ratio
      action: warn
      config:
        primary_script: Latin
        min_ratio: 0.80

    # ── No corporate jargon ──
    - name: no_jargon
      description: "Avoid corporate buzzwords"
      enabled: true
      type: forbidden_words
      action: warn
      config:
        words:
          - "synergy"
          - "paradigm shift"
          - "circle back"
          - "deep dive"
          - "move the needle"
          - "low-hanging fruit"
          - "think outside the box"

    # ── No markdown in casual chat ──
    - name: no_markdown
      description: "No markdown formatting in casual responses"
      enabled: true
      type: regex
      action: block
      config:
        patterns:
          - "^#{1,6}\\s"
          - "\\*\\*[^*]+\\*\\*"
          - "```[\\s\\S]*?```"

    # ── No formal openings ──
    - name: no_formal_openings
      description: "Skip formal email-style openings"
      enabled: true
      type: starts_with
      action: block
      config:
        prefixes:
          - "Dear"
          - "Hello"
          - "Greetings"
          - "I hope this message finds you well"
          - "To whom it may concern"

    # ── Keep it short ──
    - name: be_concise
      description: "Keep responses under 25 lines"
      enabled: true
      type: length
      action: warn
      config:
        max_lines: 25
