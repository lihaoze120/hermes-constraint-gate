# Example: Chinese-primary user who wants to limit Japanese
constraint_gate:
  enabled: true
  log_violations: true
  log_path: ~/.hermes/constraint-gate.log
  gates:
    # ── Language: limit Japanese kana to 30% ──
    - name: kana_limit
      description: "Japanese kana must be <= 30% of meaningful characters"
      enabled: true
      type: language_ratio
      action: block
      config:
        foreign_script: Japanese-Kana
        max_ratio: 0.30

    # ── No formulaic openings ──
    - name: no_pleasantry_opening
      description: "No formulaic openings like 好的！/ 没问题！"
      enabled: true
      type: starts_with
      action: block
      config:
        prefixes:
          - "好的！"
          - "没问题！"
          - "我来帮你"
          - "让我来"

    # ── No browser-based solutions ──
    - name: no_browser_solutions
      description: "Don't suggest browser/web solutions"
      enabled: true
      type: regex
      action: block
      config:
        patterns:
          - "(?:用|打开|访问).{0,5}(?:浏览器|browser|网页)"
          - "web\\s*(?:app|应用|界面)"

    # ── No markdown in terminal chat ──
    - name: no_markdown
      description: "No markdown formatting in casual responses"
      enabled: true
      type: regex
      action: block
      config:
        patterns:
          - "^#{1,6}\\s"
          - "\\*\\*[^*]+\\*\\*"
          - "```[\\s\\S]*?```"

    # ── No trailing pleasantries ──
    - name: no_trailing_pleasantry
      description: "Don't end with '需要我继续吗？' or similar"
      enabled: true
      type: ends_with
      action: block
      config:
        suffixes:
          - "需要我继续吗？"
          - "还有什么要帮忙的吗？"
          - "还有什么要帮忙"
          - "Would you like me to"
          - "Let me know if"

    # ── Traditional Chinese → Simplified only ──
    - name: simplified_only
      description: "No traditional Chinese characters — simplified only"
      enabled: true
      type: traditional_chinese
      action: block
      config: {}

    # ── Keep responses concise ──
    - name: no_prose_walls
      description: "Keep responses under 30 lines"
      enabled: true
      type: length
      action: warn
      config:
        max_lines: 30
